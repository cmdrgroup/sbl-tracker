<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>Re: your support request</title>
</head>
<body style="margin:0; padding:0; background:#0A0A0A;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0A0A0A;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:520px; background:#1E1E20; border:1px solid #2D2D2F; border-radius:8px;">
          <tr>
            <td style="padding:24px 28px 16px; border-bottom:1px solid #2D2D2F;">
              <div style="font-family:Arial,Helvetica,sans-serif; font-weight:700; font-size:20px; letter-spacing:6px; color:#C4A04F;">&#9632; COMMAND OVERLAY</div>
              <div style="font-family:Arial,Helvetica,sans-serif; font-size:11px; letter-spacing:2px; color:#8B8B90; text-transform:uppercase; margin-top:6px;">Support &middot; Ticket {{ticket_id}}</div>
            </td>
          </tr>
          <tr>
            <td style="padding:28px;">
              <p style="font-family:Arial,Helvetica,sans-serif; font-size:14px; line-height:1.6; color:#E4E4E7; margin:0 0 16px;">Hi {{name}},</p>
              <div style="font-family:Arial,Helvetica,sans-serif; font-size:14px; line-height:1.7; color:#B8B8BD; margin:0 0 24px; white-space:pre-line;">{{message}}</div>
              <table role="presentation" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="border-radius:6px; background:#1E1E20; border:1px solid #C4A04F;">
                    <a href="{{app_url}}" style="display:inline-block; padding:11px 22px; font-family:Arial,Helvetica,sans-serif; font-size:13px; font-weight:700; letter-spacing:0.5px; color:#C4A04F; text-decoration:none; border-radius:6px;">Open Command Overlay &#8594;</a>
                  </td>
                </tr>
              </table>
              <p style="font-family:Arial,Helvetica,sans-serif; font-size:12px; color:#8B8B90; margin:24px 0 0;">Reply to this email and it stays on your ticket.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 28px; border-top:1px solid #2D2D2F;">
              <div style="font-family:Arial,Helvetica,sans-serif; font-size:11px; color:#6B6B70;">Command Overlay &middot; CMDR Group &middot; app.commandoverlay.com</div>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
